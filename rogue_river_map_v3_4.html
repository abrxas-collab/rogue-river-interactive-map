<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Rogue River, Oregon — Town Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #faf6ee;
  --cream-dark: #f0e8d8;
  --text-dark: #2a2520;
  --text-mid: #5a5248;
  --text-light: #8a7d6b;
  --brown: #6b4c2e;
  --brown-btn: #7a5a38;
  --teal-link: #2a7d8f;
  --shadow: 0 4px 20px rgba(42,37,32,0.12);
  --shadow-lg: 0 12px 48px rgba(42,37,32,0.22);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
  background: var(--cream);
  color: var(--text-dark);
  overflow: hidden;
  height: 100vh; width: 100vw;
}

/* MAP */
#map { width:100%; height:100%; position:absolute; top:0; left:0; z-index:1; }
.leaflet-tile-pane { filter: saturate(0.82) brightness(1.03) sepia(0.06); }
.leaflet-control-zoom { display:none; }

/* HEADER */
#header {
  position:fixed; top:0; left:0; right:0; z-index:1000;
  background: linear-gradient(180deg, rgba(250,246,238,0.97) 0%, rgba(250,246,238,0.93) 100%);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(107,76,46,0.1);
  padding: 8px 12px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
#logo { height:48px; flex-shrink:0; cursor:pointer; transition:transform 0.2s; }
#logo:hover { transform:scale(1.05); }
#title-block { flex-shrink:0; margin-right:4px; }
#title-block h1 {
  font-family:'Fredoka',sans-serif; font-weight:600; font-size:18px;
  color: var(--brown); line-height:1.1;
}
#title-block .subtitle {
  font-size:10px; color:var(--text-light); letter-spacing:1.5px;
  text-transform:uppercase; font-weight:500;
}

/* SEARCH */
#search-wrap { position:relative; flex:1 1 180px; max-width:280px; min-width:140px; }
#search-input {
  width:100%; padding:8px 12px 8px 34px; border-radius:22px;
  border:1.5px solid rgba(107,76,46,0.18); background:white;
  font-size:13px; font-family:inherit; color:var(--text-dark); outline:none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#search-input:focus { border-color: var(--teal-link); box-shadow:0 0 0 3px rgba(42,125,143,0.1); }
#search-input::placeholder { color:var(--text-light); }
#search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--text-light); pointer-events:none; }

/* FILTERS */
#filters { display:flex; gap:5px; flex-wrap:wrap; align-items:center; }
.filter-pill {
  display:flex; align-items:center; gap:4px; padding:5px 10px; border-radius:18px;
  border:1.5px solid; background:white; font-size:11px; font-weight:500;
  font-family:inherit; cursor:pointer; transition:all 0.2s; white-space:nowrap;
}
.filter-pill .fp-emoji { font-size:12px; }
.filter-pill.active { color:white; }
.filter-pill:not(.active) { opacity:0.5; }
.filter-pill:hover { transform:translateY(-1px); box-shadow:var(--shadow); }
.filter-pill.all-pill { border-color: var(--brown); }
.filter-pill.all-pill.active { background: var(--brown); color: white; }

/* COUNT BADGE */
#count-badge {
  position:fixed; bottom:20px; left:12px; z-index:1000;
  background:rgba(42,37,32,0.85); color:white; padding:6px 14px;
  border-radius:20px; font-size:12px; font-weight:500;
  backdrop-filter:blur(8px); pointer-events:none;
}

/* ZOOM CONTROLS */
#zoom-controls {
  position:fixed; bottom:20px; right:12px; z-index:1000;
  display:flex; flex-direction:column; gap:3px;
}
.zoom-btn {
  width:36px; height:36px; border-radius:10px;
  border:1px solid rgba(107,76,46,0.15); background:rgba(250,246,238,0.95);
  backdrop-filter:blur(8px); font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:var(--text-dark); transition:all 0.15s; font-family:inherit;
}
.zoom-btn:hover { background:white; box-shadow:var(--shadow); }
#home-btn { font-size:13px; margin-top:3px; }
#locate-btn { font-size:15px; margin-top:3px; }
#locate-btn.active { background: #2a7d8f; color: white; border-color: #2a7d8f; }

/* Pulsing user location dot */
.user-location-dot {
  width: 16px; height: 16px; border-radius: 50%;
  background: #2a7d8f; border: 3px solid white;
  box-shadow: 0 0 0 2px #2a7d8f;
  animation: locpulse 1.8s ease-out infinite;
}
@keyframes locpulse {
  0%   { box-shadow: 0 0 0 2px rgba(42,125,143,0.8); }
  70%  { box-shadow: 0 0 0 12px rgba(42,125,143,0); }
  100% { box-shadow: 0 0 0 2px rgba(42,125,143,0); }
}

/* MODAL OVERLAY */
#modal-overlay {
  display:none; position:fixed; inset:0; z-index:2000;
  background:rgba(42,37,32,0.5); backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px);
  justify-content:center; align-items:center; padding:20px;
}
#modal-overlay.open { display:flex; }

/* MODAL */
#modal {
  background: var(--cream); border-radius:20px;
  max-width:460px; width:100%; max-height:85vh; overflow-y:auto;
  box-shadow: var(--shadow-lg); animation:fadeScale 0.25s ease-out; position:relative;
}
#modal-hero {
  width:100%; height:180px; object-fit:cover; border-radius:20px 20px 0 0;
  display:none;
}
#modal-hero.visible { display:block; }

/* Hide handle when hero is visible */
#modal-hero.visible ~ #modal-handle { display:none; }

/* HOME-BASED BUSINESSES LIST MODAL */
#hb-overlay {
  display:none; position:fixed; inset:0; z-index:2000;
  background:rgba(42,37,32,0.5); backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px);
  justify-content:center; align-items:center; padding:20px;
}
#hb-overlay.open { display:flex; }
#hb-modal {
  background:var(--cream); border-radius:20px;
  max-width:460px; width:100%; max-height:85vh; overflow-y:auto;
  box-shadow:var(--shadow-lg); animation:fadeScale 0.25s ease-out; position:relative;
}
.hb-hero {
  width:100%; height:140px; border-radius:20px 20px 0 0;
  background:linear-gradient(135deg, #6b3d10 0%, #a86828 45%, #8a5820 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
}
.hb-hero-title {
  color:rgba(255,255,255,0.9); font-family:'Fredoka',sans-serif; font-size:22px; font-weight:600;
}
#hb-close {
  position:absolute; top:12px; right:14px; z-index:10;
  width:30px; height:30px; border-radius:50%; border:1px solid rgba(42,37,32,0.1);
  background:rgba(255,255,255,0.85); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:15px; color:var(--text-mid); transition:background 0.15s;
}
#hb-close:hover { background:white; }
#hb-list { padding:8px 22px 22px; }
.hb-item { padding:14px 0; border-bottom:1px solid rgba(42,37,32,0.07); }
.hb-item:last-child { border-bottom:none; }
.hb-item-name {
  font-family:'DM Sans', sans-serif; font-weight:700; font-size:17px;
  color:var(--text-dark); margin-bottom:6px;
}
.hb-item-links { display:flex; flex-direction:column; gap:4px; }
.hb-item-links a {
  font-size:13px; color:var(--teal-link); text-decoration:none;
  display:flex; align-items:center; gap:6px;
}
.hb-item-links a:hover { text-decoration:underline; }
@keyframes fadeScale {
  from { opacity:0; transform:scale(0.95) translateY(20px); }
  to { opacity:1; transform:scale(1) translateY(0); }
}

/* Drag handle */
#modal-handle {
  width:40px; height:4px; border-radius:2px; background:rgba(42,37,32,0.15);
  margin:12px auto 0;
}

#modal-close {
  position:absolute; top:12px; right:14px; z-index:10;
  width:30px; height:30px; border-radius:50%; border:1px solid rgba(42,37,32,0.1);
  background:rgba(255,255,255,0.85); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:15px; color:var(--text-mid); transition:background 0.15s;
}
#modal-close:hover { background:white; }

/* Category badge */
#modal-cat-badge {
  display:inline-flex; align-items:center; gap:5px;
  padding:5px 14px; border-radius:20px; font-size:11px;
  font-weight:700; text-transform:uppercase; letter-spacing:0.8px;
  color:white; margin:16px 22px 0;
}
#modal-cat-emoji { font-size:13px; }

/* Title & address */
#modal-title {
  font-family:'Fredoka',sans-serif; font-weight:600; font-size:24px;
  color:var(--text-dark); padding:10px 22px 0; line-height:1.25;
}
#modal-address {
  padding:4px 22px 0; font-size:14px; color:var(--text-light);
  display:flex; align-items:center; gap:5px;
}
#modal-address .pin-icon { font-size:15px; }

#modal-divider {
  height:1px; background:rgba(42,37,32,0.08); margin:14px 22px 0;
}

/* Info rows */
#modal-info { padding:6px 22px 0; }
.modal-row {
  display:flex; align-items:center; gap:10px;
  padding:10px 0; font-size:14px; color:var(--text-mid); line-height:1.4;
}
.modal-row + .modal-row { border-top:1px solid rgba(42,37,32,0.05); }
.modal-row-icon { flex-shrink:0; font-size:18px; width:24px; text-align:center; }
.modal-row a { color:var(--teal-link); text-decoration:none; word-break:break-all; }
.modal-row a:hover { text-decoration:underline; }

/* Get Directions button */
#modal-buttons { display:flex; gap:8px; margin:18px 22px 20px; }
#modal-buttons button {
  display:flex; align-items:center; justify-content:center; gap:8px;
  flex:1; padding:14px; border-radius:14px;
  color:white; border:none;
  font-size:14px; font-weight:600; font-family:'Fredoka',sans-serif;
  cursor:pointer; transition:background 0.15s;
}
#modal-website {
  background: var(--teal-link);
}
#modal-website:hover { background: #3a8a7a; }
#modal-website.hidden { display:none; }
.btn-icon { font-size:16px; }

/* Membership badge */
#modal-membership {
  margin:0 22px 16px; padding:7px 12px; background:rgba(196,154,60,0.1);
  border-radius:10px; font-size:12px; color:var(--text-light);
  display:flex; align-items:center; gap:5px;
}
#modal-membership .star { color:#c49a3c; }

/* SEARCH DROPDOWN */
#search-results {
  display:none; position:absolute; top:100%; left:0; right:0;
  margin-top:4px; background:white; border-radius:14px;
  box-shadow:var(--shadow-lg); max-height:260px; overflow-y:auto; z-index:1001;
}
#search-results.open { display:block; }
.search-item {
  padding:9px 14px; cursor:pointer; display:flex; align-items:center;
  gap:10px; font-size:13px; transition:background 0.1s;
  border-bottom:1px solid var(--cream);
}
.search-item:last-child { border-bottom:none; }
.search-item:hover { background:var(--cream); }
.search-item .s-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.search-item .s-name { font-weight:500; color:var(--text-dark); }
.search-item .s-addr { font-size:11px; color:var(--text-light); margin-left:auto; white-space:nowrap; }

/* RESPONSIVE */
@media (max-width:768px) {
  #header { padding:6px 8px; gap:6px; }
  #logo { height:38px; }
  #title-block h1 { font-size:15px; }
  #search-wrap { max-width:none; flex-basis:100%; order:10; }
  #filters { order:11; flex-basis:100%; }
  .filter-pill { padding:4px 8px; font-size:10px; }
  #modal { max-width:100%; border-radius:18px; margin:10px; }
  #modal-title { font-size:20px; }
}
@media (max-width:480px) {
  #title-block { display:none; }
  #logo { height:42px; }
  #modal-title { font-size:18px; }
}

/* VIEW TOGGLE */
#view-toggle {
  display:flex; gap:2px; background:var(--cream-dark);
  border-radius:10px; padding:3px; flex-shrink:0;
}
.view-btn {
  padding:5px 11px; border-radius:7px; border:none;
  background:transparent; font-size:12px; font-weight:600;
  font-family:inherit; cursor:pointer; color:var(--text-light);
  transition:all 0.15s; white-space:nowrap;
}
.view-btn.active { background:white; color:var(--text-dark); box-shadow:0 1px 4px rgba(0,0,0,0.1); }
.view-btn:hover:not(.active) { color:var(--text-mid); }

/* LIST VIEW */
#list-view {
  display:none; position:fixed; inset:0; z-index:500;
  background:var(--cream); overflow-y:auto;
}
#list-inner {
  display:flex; flex-direction:column; gap:8px;
  padding:12px; max-width:640px; margin:0 auto;
}
#list-empty {
  text-align:center; padding:48px 20px;
  color:var(--text-light); font-size:15px;
}

/* BUSINESS CARDS */
.biz-card {
  display:flex; align-items:center; gap:12px;
  padding:12px 14px; background:white; border-radius:14px;
  cursor:pointer; transition:transform 0.15s, box-shadow 0.15s;
  border-left:4px solid; text-align:left;
}
.biz-card:hover { transform:translateY(-1px); box-shadow:var(--shadow); }
.biz-card-emoji { font-size:22px; flex-shrink:0; line-height:1; }
.biz-card-body { flex:1; min-width:0; }
.biz-card-name { font-weight:600; font-size:14px; color:var(--text-dark); line-height:1.3; }
.biz-card-sub { font-size:12px; color:var(--text-light); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.biz-card-badge {
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:0.5px; color:white; padding:3px 8px;
  border-radius:10px; white-space:nowrap; flex-shrink:0;
}
.biz-card-arrow { color:var(--text-light); font-size:18px; flex-shrink:0; line-height:1; }
@media (max-width:480px) { .biz-card-badge { display:none; } }

/* LIST STICKY BAR */
#list-sticky-bar {
  position:sticky; top:var(--header-h, 0px); z-index:10;
  background:var(--cream); padding:8px 12px 6px;
  border-bottom:1px solid rgba(107,76,46,0.08);
  max-width:640px; margin:0 auto; width:100%;
}
#list-count-text {
  font-size:11px; font-weight:600; color:var(--text-light);
  text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px;
}
#list-pills {
  display:flex; gap:5px; overflow-x:auto; padding-bottom:2px;
  scrollbar-width:none; -ms-overflow-style:none;
}
#list-pills::-webkit-scrollbar { display:none; }

/* BACK TO TOP */
#back-to-top {
  display:none; position:fixed; bottom:24px; right:14px; z-index:600;
  width:40px; height:40px; border-radius:50%; background:var(--brown);
  color:white; border:none; font-size:18px; cursor:pointer;
  box-shadow:var(--shadow); transition:opacity 0.2s, transform 0.15s;
  align-items:center; justify-content:center;
}
#back-to-top:hover { transform:translateY(-2px); }

/* LIST EMPTY STATE */
#list-empty {
  text-align:center; padding:52px 20px; color:var(--text-light); font-size:14px;
}
#list-empty .empty-emoji { font-size:40px; margin-bottom:12px; }
#list-empty .empty-title { font-weight:600; color:var(--text-dark); font-size:16px; margin-bottom:6px; }
#list-empty .empty-clear {
  margin-top:18px; background:var(--brown); color:white; border:none;
  padding:10px 22px; border-radius:20px; font-family:inherit; font-size:13px;
  font-weight:600; cursor:pointer; transition:background 0.15s;
}
#list-empty .empty-clear:hover { background:#8b6a48; }

/* Hide default leaflet popups */
.leaflet-popup-content-wrapper, .leaflet-popup-tip-container { display:none; }

/* Tooltip */
.custom-tooltip {
  background:rgba(42,37,32,0.88)!important; color:white!important;
  border:none!important; border-radius:8px!important;
  padding:5px 10px!important; font-family:'DM Sans',sans-serif!important;
  font-size:12px!important; font-weight:500!important;
  box-shadow:0 2px 8px rgba(0,0,0,0.2)!important;
}
.leaflet-tooltip-top::before { border-top-color:rgba(42,37,32,0.88)!important; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <img id="logo" alt="City of Rogue River, Oregon" onclick="resetMap()" />
  <div id="title-block">
    <h1>Rogue River</h1>
    <div class="subtitle">Oregon · Tree City U.S.A.</div>
  </div>
  <div id="view-toggle">
    <button class="view-btn active" id="btn-map" onclick="setView('map')">🗺️ Map</button>
    <button class="view-btn" id="btn-list" onclick="setView('list')">☰ List</button>
  </div>
  <div id="search-wrap">
    <svg id="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search-input" placeholder="Search businesses..." autocomplete="off" />
    <div id="search-results"></div>
  </div>
  <div id="filters"></div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- LIST VIEW -->
<div id="list-view">
  <div id="list-sticky-bar">
    <div id="list-count-text"></div>
    <div id="list-pills"></div>
  </div>
  <div id="list-inner"></div>
</div>
<button id="back-to-top" title="Back to top">↑</button>

<!-- ZOOM -->
<div id="zoom-controls">
  <button class="zoom-btn" onclick="map.zoomIn()" title="Zoom in">+</button>
  <button class="zoom-btn" onclick="map.zoomOut()" title="Zoom out">−</button>
  <button class="zoom-btn" id="home-btn" onclick="resetMap()" title="Reset view">⌂</button>
  <button class="zoom-btn" id="locate-btn" onclick="locateMe()" title="Find my location" style="display:none">📍</button>
</div>

<!-- COUNT -->
<div id="count-badge"></div>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal" onclick="event.stopPropagation()">
    <img id="modal-hero" alt="" onerror="this.classList.remove('visible')">
    <div id="modal-handle"></div>
    <button id="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-cat-badge"><span id="modal-cat-emoji"></span><span id="modal-cat-text"></span></div>
    <div id="modal-title"></div>
    <div id="modal-address"><span class="pin-icon">📍</span><span id="modal-addr-text"></span></div>
    <div id="modal-divider"></div>
    <div id="modal-info"></div>
    <div id="modal-member-wrap"></div>
    <div id="modal-buttons">
      <button id="modal-website" class="hidden" onclick="openWebsite()">
        <span class="btn-icon">🌐</span> Website
      </button>
    </div>
  </div>
</div>

<!-- HOME-BASED BUSINESSES LIST MODAL -->
<div id="hb-overlay" onclick="closeHBModal(event)">
  <div id="hb-modal" onclick="event.stopPropagation()">
    <div class="hb-hero">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="white" opacity="0.9"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <div class="hb-hero-title">Home-Based Businesses</div>
    </div>
    <button id="hb-close">✕</button>
    <div id="hb-list"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ===== CATEGORIES =====
const CAT_IMAGES = {
  food:        "https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=600&h=300&fit=crop",
  shopping:    "https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=600&h=300&fit=crop",
  health:      "https://images.unsplash.com/photo-1576091160550-2173dba999ef?w=600&h=300&fit=crop",
  services:    "https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=600&h=300&fit=crop",
  finance:     "https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=600&h=300&fit=crop",
  attractions: "https://images.unsplash.com/photo-1513542789411-b6a5d4f31634?w=600&h=300&fit=crop",
  community:   "https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=600&h=300&fit=crop",
  govt:        "https://images.unsplash.com/photo-1575517111478-7f6afd0973db?w=600&h=300&fit=crop",
  homebiz:     "https://images.unsplash.com/photo-1497366216548-37526070297c?w=600&h=300&fit=crop"
};

// ===== CREATE PIN ICON =====
function createPin(biz, highlighted) {
  const c = CATEGORIES[biz.cat];
  const s = highlighted ? 42 : 34;
  const iconSize = s * 0.5;
  const scale = iconSize / 24;
  const tx = (s / 2 - iconSize / 2).toFixed(2);
  const ty = (s * 0.36 - iconSize / 2).toFixed(2);
  const pad = 4; // top padding so arc apex isn't clipped by viewBox
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s+14+pad}" viewBox="0 ${-pad} ${s} ${s+14+pad}">
    <defs><filter id="ds${s}"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#00000030"/></filter></defs>
    <ellipse cx="${s/2}" cy="${s+8}" rx="${s/5}" ry="3.5" fill="rgba(0,0,0,0.12)"/>
    <path d="M${s/2},${s+3} C${s/2-2},${s-3} 3,${s*0.58} 3,${s*0.36}
      A${s/2-3},${s/2-3} 0 1 1 ${s-3},${s*0.36}
      C${s-3},${s*0.58} ${s/2+2},${s-3} ${s/2},${s+3}Z"
      fill="${c.color}" filter="url(#ds${s})" stroke="white" stroke-width="1.5"/>
    <g transform="translate(${tx},${ty}) scale(${scale.toFixed(3)})">
      <path d="${c.icon}" fill="white"/>
    </g>
  </svg>`;
  return L.divIcon({
    html: svg, className: '',
    iconSize: [s, s+14+pad], iconAnchor: [s/2, s+10+pad], popupAnchor: [0, -(s+6+pad)]
  });
}

let markers = [];

activeFilters.delete('all'); // "all" is a toggle, not a real category
let allActive = true;
let searchQuery = '';

function getVisibleCats() {
  return Object.keys(CATEGORIES).filter(k => k !== 'all');
}

// ===== RENDER MARKERS =====
function renderMarkers() {
  markers.forEach(m => map.removeLayer(m.marker));
  markers = [];
  const q = searchQuery.toLowerCase();
  let count = 0;
  BUSINESSES.forEach(biz => {
    if (biz.cat === 'homebiz') return; // no map pin — pill opens list modal
    if (!allActive && !activeFilters.has(biz.cat)) return;
    if (q && !biz.name.toLowerCase().includes(q) && !(biz.address||'').toLowerCase().includes(q)) return;
    const icon = createPin(biz, false);
    const marker = L.marker([biz.lat, biz.lng], { icon })
      .addTo(map)
      .on('click', () => openModal(biz));
    marker.bindTooltip(biz.name, { direction:'top', offset:[0,-42], className:'custom-tooltip' });
    markers.push({ marker, biz });
    count++;
  });
  document.getElementById('count-badge').textContent = `${count} businesses`;
  renderList();
}

// ===== FILTERS =====
function buildPillsInto(container) {
  container.innerHTML = '';
  const allPill = document.createElement('button');
  allPill.className = 'filter-pill all-pill' + (allActive ? ' active' : '');
  allPill.style.borderColor = CATEGORIES.all.color;
  allPill.style.background = allActive ? CATEGORIES.all.color : 'white';
  allPill.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="${CATEGORIES.all.icon}"/></svg>All`;
  allPill.onclick = () => {
    allActive = true;
    activeFilters = new Set(getVisibleCats());
    buildFilters();
    renderMarkers();
  };
  container.appendChild(allPill);
  getVisibleCats().forEach(key => {
    const cat = CATEGORIES[key];
    const isOn = !allActive && activeFilters.has(key);
    const pill = document.createElement('button');
    pill.className = 'filter-pill' + (allActive || isOn ? ' active' : '');
    pill.style.borderColor = cat.color;
    pill.style.background = (allActive || isOn) ? cat.color : 'white';
    const iconColor = (allActive || isOn) ? 'white' : cat.color;
    pill.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="${iconColor}"><path d="${cat.icon}"/></svg>${cat.label}`;
    if (key === 'homebiz') {
      pill.onclick = openHomebizList;
    } else {
      pill.onclick = () => {
        if (allActive) {
          allActive = false;
          activeFilters = new Set([key]);
        } else if (activeFilters.has(key)) {
          activeFilters.delete(key);
          if (activeFilters.size === 0) { allActive = true; activeFilters = new Set(getVisibleCats()); }
        } else {
          activeFilters.add(key);
        }
        if (!allActive && activeFilters.size === getVisibleCats().length) { allActive = true; }
        buildFilters();
        renderMarkers();
      };
    }
    container.appendChild(pill);
  });
}

function buildFilters() {
  buildPillsInto(document.getElementById('filters'));
  buildPillsInto(document.getElementById('list-pills'));
}

// ===== SEARCH =====
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');
searchInput.addEventListener('input', e => {
  searchQuery = e.target.value;
  renderMarkers();
  updateSearchDropdown();
});
searchInput.addEventListener('focus', () => { if (searchQuery) updateSearchDropdown(); });
document.addEventListener('click', e => {
  if (!e.target.closest('#search-wrap')) searchResults.classList.remove('open');
});

function updateSearchDropdown() {
  const q = searchQuery.toLowerCase();
  if (!q) { searchResults.classList.remove('open'); return; }
  const matches = BUSINESSES.filter(b =>
    b.name.toLowerCase().includes(q) || b.address.toLowerCase().includes(q)
  ).slice(0, 8);
  if (!matches.length) { searchResults.classList.remove('open'); return; }
  searchResults.innerHTML = matches.map(b => {
    const c = CATEGORIES[b.cat];
    return `<div class="search-item" data-lat="${b.lat}" data-lng="${b.lng}" data-name="${b.name}">
      <span class="s-dot" style="background:${c.color}"></span>
      <span class="s-name">${hl(b.name, q)}</span>
      <span class="s-addr">${b.address}</span>
    </div>`;
  }).join('');
  searchResults.querySelectorAll('.search-item').forEach(item => {
    item.onclick = () => {
      const nm = item.dataset.name;
      map.setView([+item.dataset.lat, +item.dataset.lng], 18, { animate:true });
      searchResults.classList.remove('open');
      searchInput.value = nm;
      searchQuery = nm.toLowerCase();
      renderMarkers();
      const biz = BUSINESSES.find(b => b.name === nm);
      if (biz) setTimeout(() => openModal(biz), 300);
    };
  });
  searchResults.classList.add('open');
}
function hl(t, q) {
  const i = t.toLowerCase().indexOf(q);
  return i === -1 ? t : t.slice(0,i)+'<strong>'+t.slice(i,i+q.length)+'</strong>'+t.slice(i+q.length);
}

// ===== MODAL =====
function openModal(biz) {
  currentBiz = biz;
  const cat = CATEGORIES[biz.cat];

  const hero = document.getElementById('modal-hero');
  const imgSrc = biz.img || CAT_IMAGES[biz.cat];
  if (imgSrc) { hero.src = imgSrc; hero.classList.add('visible'); }
  else { hero.src = ''; hero.classList.remove('visible'); }

  document.getElementById('modal-cat-badge').style.background = cat.color;
  document.getElementById('modal-cat-emoji').innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="${cat.icon}"/></svg>`;
  document.getElementById('modal-cat-text').textContent = cat.label.toUpperCase();
  document.getElementById('modal-title').textContent = biz.name;
  document.getElementById('modal-addr-text').textContent = biz.address + ', ' + biz.city;

  let rows = '';
  if (biz.phone) {
    rows += `<div class="modal-row"><span class="modal-row-icon">📞</span><a href="tel:${biz.phone}">${biz.phone}</a></div>`;
  }
  if (biz.email) {
    rows += `<div class="modal-row"><span class="modal-row-icon">✉️</span><a href="mailto:${biz.email}">${biz.email}</a></div>`;
  }
  document.getElementById('modal-info').innerHTML = rows;

  let memberHTML = '';
  if (biz.membership === "President's Circle") {
    memberHTML = `<div id="modal-membership"><span class="star">⭐</span> President's Circle Member</div>`;
  } else if (biz.membership === "New") {
    memberHTML = `<div id="modal-membership">🆕 New Member</div>`;
  }
  document.getElementById('modal-member-wrap').innerHTML = memberHTML;

  const webBtn = document.getElementById('modal-website');
  if (biz.url) { webBtn.classList.remove('hidden'); } else { webBtn.classList.add('hidden'); }

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  currentBiz = null;
}
document.getElementById('modal-close').addEventListener('click', function(e) {
  e.stopPropagation();
  document.getElementById('modal-overlay').classList.remove('open');
  currentBiz = null;
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('modal-overlay').classList.remove('open'); currentBiz = null;
    document.getElementById('hb-overlay').classList.remove('open');
  }
});

// ===== HOME-BASED BUSINESSES LIST MODAL =====
function openHomebizList() {
  const list = document.getElementById('hb-list');
  list.innerHTML = BUSINESSES.filter(b => b.cat === 'homebiz').map(biz => {
    const links = [];
    if (biz.phone) links.push(`<a href="tel:${biz.phone}">📞 ${biz.phone}</a>`);
    if (biz.email) links.push(`<a href="mailto:${biz.email}">✉️ ${biz.email}</a>`);
    if (biz.url) links.push(`<a href="${biz.url}" target="_blank" rel="noopener">🌐 Website</a>`);
    return `<div class="hb-item">
      <div class="hb-item-name">${biz.name}</div>
      <div class="hb-item-links">${links.join('')}</div>
    </div>`;
  }).join('');
  document.getElementById('hb-overlay').classList.add('open');
}

function closeHBModal(e) {
  if (e && e.target !== document.getElementById('hb-overlay')) return;
  document.getElementById('hb-overlay').classList.remove('open');
}
document.getElementById('hb-close').addEventListener('click', function(e) {
  e.stopPropagation();
  document.getElementById('hb-overlay').classList.remove('open');
});

function openWebsite() {
  if (!currentBiz || !currentBiz.url) return;
  window.open(currentBiz.url, '_blank');
}

// ===== LIST VIEW =====
let viewMode = 'map';
const listView = document.getElementById('list-view');

function setView(mode) {
  viewMode = mode;
  const headerH = document.getElementById('header').offsetHeight;
  document.documentElement.style.setProperty('--header-h', headerH + 'px');
  document.getElementById('btn-map').classList.toggle('active', mode === 'map');
  document.getElementById('btn-list').classList.toggle('active', mode === 'list');
  if (mode === 'list') {
    listView.style.display = 'block';
    listView.style.paddingTop = headerH + 'px';
    renderList();
  } else {
    listView.style.display = 'none';
    document.getElementById('back-to-top').style.display = 'none';
  }
}

listView.addEventListener('scroll', () => {
  const btn = document.getElementById('back-to-top');
  btn.style.display = listView.scrollTop > 150 ? 'flex' : 'none';
});
document.getElementById('back-to-top').addEventListener('click', () => {
  listView.scrollTo({ top: 0, behavior: 'smooth' });
});

function clearFilters() {
  allActive = true;
  activeFilters = new Set(getVisibleCats());
  searchQuery = '';
  document.getElementById('search-input').value = '';
  buildFilters();
  renderMarkers();
}

function selectBusiness(idx) {
  const biz = BUSINESSES[idx];
  setView('map');
  map.setView([biz.lat, biz.lng], Math.max(map.getZoom(), 17), { animate: true, duration: 0.5 });
  setTimeout(() => openModal(biz), 320);
}

function renderList() {
  if (viewMode !== 'list') return;
  const q = searchQuery.toLowerCase();
  const filtered = BUSINESSES
    .map((biz, idx) => ({ biz, idx }))
    .filter(({ biz }) => {
      if (biz.cat === 'homebiz') return false;
      if (!allActive && !activeFilters.has(biz.cat)) return false;
      if (q && !biz.name.toLowerCase().includes(q) && !(biz.address||'').toLowerCase().includes(q)) return false;
      return true;
    })
    .sort((a, b) => a.biz.name.localeCompare(b.biz.name));

  const countEl = document.getElementById('list-count-text');
  if (countEl) {
    countEl.textContent = (allActive && !q)
      ? `${BUSINESSES.length} businesses`
      : `${filtered.length} of ${BUSINESSES.length} businesses`;
  }

  const inner = document.getElementById('list-inner');
  if (!filtered.length) {
    inner.innerHTML = `<div id="list-empty">
      <div class="empty-emoji">🔍</div>
      <div class="empty-title">No businesses found</div>
      <div>Try a different search or clear your filters.</div>
      <button class="empty-clear" onclick="clearFilters()">Clear Filters</button>
    </div>`;
    return;
  }
  inner.innerHTML = filtered.map(({ biz, idx }) => {
    const cat = CATEGORIES[biz.cat];
    const sub = [biz.address, biz.phone].filter(Boolean).join(' · ');
    return `<div class="biz-card" style="border-left-color:${cat.color}" onclick="selectBusiness(${idx})">
      <span class="biz-card-emoji"><svg width="22" height="22" viewBox="0 0 24 24" fill="${cat.color}" style="display:block"><path d="${cat.icon}"/></svg></span>
      <div class="biz-card-body">
        <div class="biz-card-name">${biz.name}</div>
        <div class="biz-card-sub">${sub}</div>
      </div>
      <span class="biz-card-badge" style="background:${cat.color}">${cat.label}</span>
      <span class="biz-card-arrow">›</span>
    </div>`;
  }).join('');
}

// ===== GEOLOCATION =====
let userMarker = null;
const locateBtn = document.getElementById('locate-btn');

// Show button only if geolocation is supported (works on HTTPS, hidden on file://)
if (navigator.geolocation) locateBtn.style.display = 'flex';

function locateMe() {
  if (userMarker) {
    // Second tap: clear location marker and reset view
    map.removeLayer(userMarker);
    userMarker = null;
    locateBtn.classList.remove('active');
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      const dot = L.divIcon({ html:'<div class="user-location-dot"></div>', className:'', iconSize:[16,16], iconAnchor:[8,8] });
      userMarker = L.marker([lat, lng], { icon: dot, zIndexOffset: 1000 }).addTo(map);
      userMarker.bindTooltip('You are here', { direction:'top', offset:[0,-10], className:'custom-tooltip' });
      map.setView([lat, lng], 16, { animate: true });
      locateBtn.classList.add('active');
    },
    err => {
      alert('Unable to get your location. Please check your browser permissions.');
    },
    { enableHighAccuracy: true, timeout: 8000 }
  );
}

// ===== RESET =====
function resetMap() {
  map.setView(CENTER, DEFAULT_ZOOM, { animate:true });
  if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
  locateBtn.classList.remove('active');
  searchInput.value = '';
  searchQuery = '';
  allActive = true;
  activeFilters = new Set(getVisibleCats());
  buildFilters();
  renderMarkers();
}

// ===== INIT =====
buildFilters();
renderMarkers();
</script>
